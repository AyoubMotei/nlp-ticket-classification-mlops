name: ML Pipeline CI

# 1. Déclencheurs : Le pipeline s'exécute lors d'un push ou PR sur master, main ou develop
on:
  push:
    branches: [ "main", "develop", "master" ]
  pull_request:
    branches: [ "main", "develop", "master" ]

jobs:
  # JOB 1 : Vérification de la qualité du code (Linting)
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          
      - name: Lint with flake8
        run: |
          # Arrête le build s'il y a des erreurs de syntaxe Python ou des noms non définis
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Sortie en douceur pour les avertissements de style (PEP8)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # JOB 2 : Construction de l'image Docker (uniquement si le Lint réussit)
  build-docker:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          # Construction de l'image avec un tag basé sur le SHA du commit pour la traçabilité
          docker build -t nlp-ticket-classification-mlops:${{ github.sha }} .
          echo "L'image Docker a été construite avec succès."